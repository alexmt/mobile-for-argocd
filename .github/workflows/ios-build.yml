name: iOS Build

on:
  workflow_dispatch:
    inputs:
      distribution:
        description: 'Distribution method'
        required: true
        default: 'ad-hoc'
        type: choice
        options:
          - ad-hoc
          - app-store

jobs:
  build:
    name: Build iOS (${{ github.event.inputs.distribution }})
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Select Xcode 16
        run: |
          LATEST=$(ls /Applications | grep "Xcode_16" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST=$(ls /Applications | grep "Xcode_" | sort -V | tail -1)
          fi
          echo "Using $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ github.event.inputs.distribution == 'ad-hoc' && secrets.APPLE_PROVISIONING_PROFILE_ADHOC || secrets.APPLE_PROVISIONING_PROFILE_APPSTORE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          PP_PLIST=$(security cms -D -i "$PP_PATH")
          PP_UUID=$(echo "$PP_PLIST" | plutil -extract UUID raw -)
          PP_TEAM=$(echo "$PP_PLIST" | plutil -extract TeamIdentifier.0 raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "PP_TEAM=$PP_TEAM" >> $GITHUB_ENV

      - name: Build and archive
        run: |
          xcodebuild \
            -workspace ios/ArgoCDMobile.xcworkspace \
            -scheme ArgoCDMobile \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/ArgoCDMobile.xcarchive \
            DEVELOPMENT_TEAM="$PP_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            archive

      - name: Export IPA
        run: |
          DISTRIBUTION="${{ github.event.inputs.distribution }}"
          METHOD=$( [ "$DISTRIBUTION" = "app-store" ] && echo "app-store-connect" || echo "ad-hoc" )
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$METHOD</string>
            <key>teamID</key>
            <string>$PP_TEAM</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>io.akuity.argocd.mobile</key>
              <string>$PP_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/ArgoCDMobile.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ArgoCDMobile-${{ github.event.inputs.distribution }}-${{ github.sha }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 14

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain || true
